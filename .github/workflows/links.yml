name: Check links

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build site
        run: bun run build

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .lychee.toml 'dist/**/*.html'
          fail: true
